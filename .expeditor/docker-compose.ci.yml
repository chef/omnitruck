version: '3.8'

services:
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - omnitruck-ci

  omnitruck:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - RACK_ENV=test
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - omnitruck-ci

networks:
  omnitruck-ci:
    driver: bridge
