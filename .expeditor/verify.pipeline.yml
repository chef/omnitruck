expeditor:
  cached_folders:
    - vendor
  defaults:
    buildkite:
      timeout_in_minutes: 60

steps:
  - label: ":ruby: Run RSpec Test Suite"
    command:
      - bundle config set --local path 'vendor/bundle'
      - bundle install --jobs=4
      - bundle exec rspec --format progress
    expeditor:
      executor:
        docker:
          environment:
            - RACK_ENV=test
