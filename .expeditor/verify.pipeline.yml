expeditor:
  cached_folders:
    - vendor
  defaults:
    buildkite:
      timeout_in_minutes: 60

steps:
  # Unit tests without Redis
  - label: ":ruby: Unit Tests"
    command:
      - bundle config set --local path 'vendor/bundle'
      - bundle install --jobs=4
      - bundle binstubs --all
      - bundle exec rspec --format progress
    expeditor:
      executor:
        docker:
          environment:
            - RACK_ENV=test

  # Integration tests with Redis
  - label: ":redis: Integration Tests with Redis"
    command:
      - apt-get update || true
      - apt-get install -y redis-server
      - redis-server --daemonize yes
      - sleep 2
      - redis-cli ping
      - bundle config set --local path 'vendor/bundle'
      - bundle install --jobs=4
      - timeout 180 bundle exec ./poller || echo "Poller timed out"
      - bundle exec rspec --format documentation
    expeditor:
      executor:
        docker:
          environment:
            - RACK_ENV=test
            - REDIS_URL=redis://localhost:6379
