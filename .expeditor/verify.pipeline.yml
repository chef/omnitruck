expeditor:
  cached_folders:
    - vendor
  defaults:
    buildkite:
      timeout_in_minutes: 60

steps:
  # Stage 1: Fast unit tests without Redis
  - label: ":ruby: Unit Tests"
    command:
      - bundle config set --local path 'vendor/bundle'
      - bundle install --jobs=4
      - bundle binstubs --all
      - bundle exec rspec --format progress
    expeditor:
      executor:
        docker:
          environment:
            - RACK_ENV=test

  # Stage 2: Integration tests with Redis
  - label: ":redis: Integration Tests with Redis"
    command:
      - apt-get update || true
      - apt-get install -y redis-server
      - redis-server --version
      - redis-server --daemonize yes
      - sleep 2
      - redis-cli ping
      - bundle config set --local path 'vendor/bundle'
      - bundle install --jobs=4
      - timeout 180 bundle exec ./poller || echo "Poller timed out"
      - bundle exec rspec --format documentation
    expeditor:
      executor:
        docker:
          environment:
            - RACK_ENV=test
            - REDIS_URL=redis://localhost:6379

  # Stage 3: Test with specific mixlib-install version (optional)
  # Triggered when MIXLIB_INSTALL_VERSION or MIXLIB_INSTALL_BRANCH is set
  - label: ":gem: Test with Custom mixlib-install"
    command:
      - chmod +x .expeditor/buildkite/test-mixlib-install.sh
      - ./.expeditor/buildkite/test-mixlib-install.sh
      - apt-get update || true
      - apt-get install -y redis-server
      - redis-server --daemonize yes
      - sleep 2
      - redis-cli ping
      - timeout 180 bundle exec ./poller || echo "Poller timed out"
      - bundle exec rspec --format documentation
    if: build.env("MIXLIB_INSTALL_VERSION") != null || build.env("MIXLIB_INSTALL_BRANCH") != null
    expeditor:
      executor:
        docker:
          environment:
            - RACK_ENV=test
            - REDIS_URL=redis://localhost:6379
            - MIXLIB_INSTALL_VERSION
            - MIXLIB_INSTALL_BRANCH
