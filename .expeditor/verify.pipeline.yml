expeditor:
  cached_folders:
    - vendor
  defaults:
    buildkite:
      timeout_in_minutes: 60

steps:
  # Unit tests - runs the full RSpec suite with MockRedis fixtures
  - label: ":ruby: Run RSpec Test Suite"
    command:
      - bundle config set --local path 'vendor/bundle'
      - bundle install --jobs=4
      - bundle exec rspec --format progress
    expeditor:
      executor:
        docker:
          environment:
            - RACK_ENV=test

  # Integration tests with a real Redis instance
  - label: ":redis: Integration Tests with Redis"
    command:
      # Remove stale/broken third-party repos baked into the base image so that
      # apt-get update can still fail fast on real Ubuntu repo errors.
      - find /etc/apt/sources.list.d/ \( -name '*pgdg*' -o -name '*helm*' \) -delete
      - apt-get update -o Acquire::Retries=3
      - apt-get install -y --no-install-recommends redis-server
      - redis-server --daemonize yes
      - sleep 2
      - redis-cli ping
      - bundle config set --local path 'vendor/bundle'
      - bundle install --jobs=4
      # Seed Redis from fixture files instead of hitting packages.chef.io.
      # The full poller (which fetches from the network) is not appropriate
      # for a per-PR gate; it belongs in a dedicated nightly job.
      - bundle exec ruby spec/support/seed_redis.rb
      - bundle exec rspec --format documentation --exclude-pattern "**/redis_integration_spec.rb"
      - OMNITRUCK_USE_REAL_REDIS=1 bundle exec rspec spec/redis_integration_spec.rb --format documentation
    expeditor:
      executor:
        docker:
          environment:
            - RACK_ENV=test
            - REDIS_URL=redis://localhost:6379
